{% extends "base.html" %}
{% block content %}

<style>

.profile-container{
    max-width:700px;
    margin:40px auto;
    font-family:Arial, sans-serif;
}

.profile-card{
    padding:35px;
    border-radius:10px;
    background:#ffffff;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.profile-card h2{
    text-align:center;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:18px;
}

.form-group label{
    display:block;
    font-weight:600;
    margin-bottom:6px;
}

.form-control{
    width:100%;
    padding:10px 12px;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:14px;
    transition:0.2s;
}

.form-control:focus{
    outline:none;
    border-color:#2196F3;
}

.profile-image-preview{
    display:block;
    margin:10px auto;
    border-radius:50%;
}

.button-group{
    display:flex;
    justify-content:space-between;
    margin-top:25px;
}

.btn{
    padding:10px 20px;
    border:none;
    border-radius:6px;
    font-size:14px;
    cursor:pointer;
}

.btn-update{
    background:#2196F3;
    color:white;
}

.btn-update:hover{
    background:#1976d2;
}

.btn-cancel{
    background:#777;
    color:white;
    text-decoration:none;
    display:flex;
    align-items:center;
}

.btn-cancel:hover{
    background:#555;
}

</style>

<div class="profile-container">

<div class="profile-card">

<h2>Edit Your Profile</h2>

<form method="POST" enctype="multipart/form-data">
{% csrf_token %}

<div class="form-group">
<label>Full Name</label>
<input class="form-control" type="text" name="fullname" value="{{ profile.fullname }}">
</div>

<div class="form-group">
<label>Email</label>
<input class="form-control" type="email" value="{{ profile.email }}" readonly>
</div>

<div class="form-group">
<label>Contact</label>
<input class="form-control" type="text" name="contact" value="{{ profile.contact }}">
</div>

<div class="form-group">
<label>Gender</label>
<select class="form-control" name="gender">
<option value="male" {% if profile.gender == 'male' %}selected{% endif %}>Male</option>
<option value="female" {% if profile.gender == 'female' %}selected{% endif %}>Female</option>
<option value="other" {% if profile.gender == 'other' %}selected{% endif %}>Other</option>
</select>
</div>

<div class="form-group">
<label>Profile Image</label>

{% if profile.image %}
<img src="{{ profile.image.url }}" width="120" class="profile-image-preview">
{% endif %}

<input class="form-control" type="file" name="image">
</div>

<div class="button-group">

<button class="btn btn-update" type="submit">
Update Profile
</button>

<a href="{% url 'profile' %}" class="btn btn-cancel">
Cancel
</a>

</div>

</form>

</div>

</div>

{% endblock %}
